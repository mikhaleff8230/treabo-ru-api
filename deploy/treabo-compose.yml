services:
  api:
    build:
      context: ..
      dockerfile: Dockerfile.proffi
    working_dir: /var/www/html
    env_file:
      - ../.env.production
    environment:
      COMPOSER_PROCESS_TIMEOUT: "1800"
    volumes:
      - ..:/var/www/html
      - composer_cache:/tmp/composer-cache
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    ports:
      - "127.0.0.1:${TREABO_API_HOST_PORT:-8010}:8000"
    command: >
      sh -lc "mkdir -p storage/framework/cache/data storage/framework/sessions storage/framework/testing storage/framework/views bootstrap/cache
      && (test -f vendor/autoload.php || COMPOSER_CACHE_DIR=/tmp/composer-cache composer install --no-interaction --prefer-dist --no-dev --optimize-autoloader)
      && php artisan storage:link || true
      && php artisan migrate --force
      && php artisan optimize:clear
      && php artisan serve --host=0.0.0.0 --port=8000"

  queue:
    build:
      context: ..
      dockerfile: Dockerfile.proffi
    working_dir: /var/www/html
    env_file:
      - ../.env.production
    volumes:
      - ..:/var/www/html
      - composer_cache:/tmp/composer-cache
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    command: >
      sh -lc "(test -f vendor/autoload.php || COMPOSER_CACHE_DIR=/tmp/composer-cache composer install --no-interaction --prefer-dist --no-dev --optimize-autoloader)
      && php artisan queue:work --sleep=3 --tries=3 --timeout=120"

  mysql:
    image: mysql:8.0
    platform: linux/x86_64
    env_file:
      - ./env/mysql.env
    volumes:
      - treabo_mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-umarvel_laravel", "-p$${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 30
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  shop:
    image: node:20-alpine
    working_dir: /app
    env_file:
      - ../../shop/.env.production
    environment:
      NODE_ENV: production
      APPLICATION_MODE: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
      DISABLE_PWA: "true"
      NEXT_PUBLIC_TREABO_API_ENDPOINT: ${SHOP_TREABO_API_ENDPOINT:-https://api.treabo.ru/api}
      TREABO_API_ENDPOINT: ${SHOP_INTERNAL_TREABO_API_ENDPOINT:-http://api:8000/api}
      NEXT_PUBLIC_DEFAULT_LANGUAGE: ru
      NEXT_PUBLIC_ENABLE_MULTI_LANG: "false"
      NEXT_PUBLIC_AVAILABLE_LANGUAGES: ru
    volumes:
      - ../../shop:/app
      - shop_node_modules:/app/node_modules
    depends_on:
      - api
    restart: unless-stopped
    ports:
      - "127.0.0.1:${TREABO_SHOP_HOST_PORT:-3010}:3000"
    command: >
      sh -lc "apk add --no-cache libc6-compat python3 make g++ >/dev/null
      && if [ ! -d node_modules/next ]; then NODE_ENV=development npm ci --include=dev --legacy-peer-deps --ignore-scripts --no-audit --no-fund || NODE_ENV=development npm install --include=dev --legacy-peer-deps --ignore-scripts --no-audit --no-fund; fi
      && if [ ! -f .next/BUILD_ID ]; then NODE_ENV=development npm run build; fi
      && NODE_ENV=production npm run start"

  admin:
    build:
      context: ../../admin
      dockerfile: Dockerfile.production
      args:
        NEXT_PUBLIC_REST_API_ENDPOINT: ${ADMIN_API_URL:-https://api.treabo.ru}
        NEXT_PUBLIC_API_URL: ${ADMIN_API_URL:-https://api.treabo.ru}
        NEXT_PUBLIC_SHOP_URL: ${ADMIN_SHOP_URL:-https://treabo.ru}
    env_file:
      - ../../admin/.env.production
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3002
      DISABLE_PWA: "true"
    ports:
      - "127.0.0.1:${TREABO_ADMIN_HOST_PORT:-3012}:3002"
    depends_on:
      - api
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    environment:
      TREABO_DOMAIN: ${TREABO_DOMAIN:-treabo.ru www.treabo.ru}
      TREABO_ADMIN_DOMAIN: ${TREABO_ADMIN_DOMAIN:-seller.treabo.ru}
      TREABO_API_DOMAIN: ${TREABO_API_DOMAIN:-api.treabo.ru}
      NGINX_ENVSUBST_FILTER: "^TREABO_"
    volumes:
      - ./nginx/templates:/etc/nginx/templates:ro
      - ./nginx/docker-entrypoint.d/99-remove-default.sh:/docker-entrypoint.d/99-remove-default.sh:ro
    depends_on:
      - api
      - shop
      - admin
    restart: unless-stopped

volumes:
  composer_cache:
  treabo_mysql:
  shop_node_modules:
