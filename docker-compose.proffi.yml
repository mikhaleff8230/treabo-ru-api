services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.proffi
    working_dir: /var/www/html
    env_file:
      - .env.proffi-docker
    environment:
      COMPOSER_PROCESS_TIMEOUT: "1800"
      PUSHER_HOST: websockets
    ports:
      - "8001:8000"
    extra_hosts:
      - "api.github.com:140.82.121.6"
      - "codeload.github.com:140.82.121.10"
    volumes:
      - .:/var/www/html
      - composer_cache:/tmp/composer-cache
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    command: >
      sh -lc "mkdir -p storage/framework/cache/data storage/framework/sessions storage/framework/testing storage/framework/views bootstrap/cache
      && (test -f vendor/autoload.php || composer install --no-interaction --prefer-dist --no-dev)
      && (php artisan storage:link || true)
      && php artisan migrate --force
      && php artisan optimize:clear
      && php artisan serve --host=0.0.0.0 --port=8000"

  mysql:
    image: mysql:8.0
    platform: linux/x86_64
    environment:
      MYSQL_DATABASE: marvel_laravel
      MYSQL_USER: marvel_laravel
      MYSQL_PASSWORD: proffi
      MYSQL_ROOT_PASSWORD: proffi
    ports:
      - "3307:3306"
    volumes:
      - proffi_mysql:/var/lib/mysql
      - ./backup_before_migration.sql:/docker-entrypoint-initdb.d/01-backup.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-umarvel_laravel", "-pproffi"]
      interval: 5s
      timeout: 5s
      retries: 30

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"

  websockets:
    build:
      context: .
      dockerfile: Dockerfile.proffi
    working_dir: /var/www/html
    env_file:
      - .env.proffi-docker
    ports:
      - "6001:6001"
    volumes:
      - .:/var/www/html
    depends_on:
      app:
        condition: service_started
    command: >
      sh -lc "php artisan websockets:serve --host=0.0.0.0 --port=6001"

volumes:
  composer_cache:
  proffi_mysql:
